services:
  postgres:
    image: postgres:16-alpine
    container_name: joysword-postgres
    environment:
      POSTGRES_DB: joysword_web
      POSTGRES_USER: joysword
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-JoySwordPostgresLocal123}"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joysword -d joysword_web"]
      interval: 5s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    container_name: joysword-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-JoySword!Offline123}"
      MSSQL_TRACE_FLAGS: "3226,4199,2371"
    ports:
      - "127.0.0.1:${MSSQL_PORT:-1433}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./database:/backups:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # Windows game stack (build first: joysword.bat build)
  # Run full stack:  joysword.bat package && docker compose --profile stack up -d
  joysword:
    image: joysword-server:${JOYSWORD_IMAGE_TAG:-local}
    profiles: ["stack"]
    platform: windows/amd64
    depends_on:
      mssql:
        condition: service_healthy
    ports:
      - "127.0.0.1:9100:9100"
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
      - "127.0.0.1:9400:9400"
      - "127.0.0.1:9500:9500"
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "1433"
      DB_USER: sa
      DB_PASSWORD: "${MSSQL_SA_PASSWORD:-JoySword!Offline123}"
      CHANNEL_SERVER_IP: "0.0.0.0"
      SERVER_READINESS_MODE: strict
    healthcheck:
      test: ["CMD-SHELL", "python scripts\\stack-status.py --check"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  mssql-data:
  postgres-data:
